name: Homeboy Release Check

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write

jobs:
  lint:
    name: Homeboy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_sqlite, mysqli
          tools: composer:v2
          coverage: none

      - name: Install project dependencies
        run: composer install --no-interaction --prefer-dist

      - uses: Extra-Chill/homeboy-action@v1
        with:
          version: 'latest'
          extension: wordpress
          commands: lint
          component: data-machine
          scope: full
          php-version: '8.2'
          node-version: '20'
          auto-issue: true
          app-token: ${{ steps.app-token.outputs.token }}

  test:
    name: Homeboy Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: homeboy_wptests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_sqlite, mysqli
          tools: composer:v2
          coverage: none

      - name: Install project dependencies
        run: composer install --no-interaction --prefer-dist

      - uses: Extra-Chill/homeboy-action@v1
        with:
          version: 'latest'
          extension: wordpress
          commands: test
          component: data-machine
          scope: full
          php-version: '8.2'
          node-version: '20'
          auto-issue: true
          app-token: ${{ steps.app-token.outputs.token }}

  audit:
    name: Homeboy Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_sqlite, mysqli
          tools: composer:v2
          coverage: none

      - name: Install project dependencies
        run: composer install --no-interaction --prefer-dist

      - uses: Extra-Chill/homeboy-action@v1
        with:
          version: 'latest'
          extension: wordpress
          commands: audit
          component: data-machine
          scope: full
          php-version: '8.2'
          node-version: '20'
          auto-issue: true
          app-token: ${{ steps.app-token.outputs.token }}
